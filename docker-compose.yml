services:
  optiqra:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: optiqra-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    # Optional: Add volume for persistent data if needed
    # volumes:
    #   - ./data:/app/data
    networks:
      - optiqra-network

networks:
  optiqra-network:
    driver: bridge
